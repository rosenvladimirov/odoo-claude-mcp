<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Odoo · Claude · MCP — Roll-up banner (850 × 2000 mm)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
const TWEAKS = /*EDITMODE-BEGIN*/{
  "variant": "classic",
  "palette": "paper",
  "accent": "claude",
  "showBleed": true,
  "showStand": true
}/*EDITMODE-END*/;
</script>

<style>
  :root{
    --paper: oklch(0.968 0.012 85);
    --paper-2: oklch(0.945 0.015 82);
    --ink: oklch(0.18 0.012 60);
    --ink-2: oklch(0.35 0.010 60);
    --ink-3: oklch(0.55 0.008 60);
    --rule: oklch(0.18 0.012 60 / 0.14);
    --rule-strong: oklch(0.18 0.012 60 / 0.28);
    --accent: oklch(0.58 0.19 25);
    --accent-ink: oklch(0.98 0.005 85);
    --chip: oklch(0.92 0.015 80);
    --term-bg: oklch(0.17 0.014 260);
    --term-ink: oklch(0.92 0.01 90);
    --term-dim: oklch(0.62 0.008 90);
    --term-green: oklch(0.78 0.16 145);
    --term-accent: oklch(0.78 0.14 55);
  }
  [data-palette="ink"]{
    --paper: oklch(0.14 0.01 260);
    --paper-2: oklch(0.19 0.012 260);
    --ink: oklch(0.96 0.005 90);
    --ink-2: oklch(0.78 0.008 90);
    --ink-3: oklch(0.60 0.008 90);
    --rule: oklch(0.96 0.005 90 / 0.14);
    --rule-strong: oklch(0.96 0.005 90 / 0.28);
    --chip: oklch(0.24 0.012 260);
  }
  [data-palette="cinnabar"]{
    --paper: oklch(0.58 0.19 25);
    --paper-2: oklch(0.52 0.19 25);
    --ink: oklch(0.98 0.010 85);
    --ink-2: oklch(0.94 0.020 85);
    --ink-3: oklch(0.82 0.040 30);
    --rule: oklch(0.98 0.010 85 / 0.22);
    --rule-strong: oklch(0.98 0.010 85 / 0.40);
    --accent: oklch(0.18 0.012 60);
    --accent-ink: oklch(0.98 0.010 85);
    --chip: oklch(0.98 0.010 85 / 0.14);
  }
  [data-accent="cinnabar"]{ --accent: oklch(0.58 0.19 25); }
  [data-accent="indigo"]{ --accent: oklch(0.52 0.17 265); }
  [data-accent="moss"]{ --accent: oklch(0.48 0.13 145); }
  [data-accent="ink"]{ --accent: oklch(0.18 0.012 60); }
  [data-accent="claude"]{ --accent: oklch(0.55 0.17 250); }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:oklch(0.14 0.01 260);color:var(--ink);font-family:"Geist",ui-sans-serif,system-ui;font-feature-settings:"ss01","cv11";min-height:100vh;overflow-x:hidden}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-feature-settings:"calt","ss01"}
  .serif{font-family:"Instrument Serif",ui-serif,Georgia,serif;font-weight:400;letter-spacing:-.015em}

  /* ========= Stage — scales the 850×2000 banner to fit viewport ========= */
  .stage{
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse at 50% 30%, oklch(0.22 0.015 260) 0%, oklch(0.10 0.01 260) 70%);
    overflow:hidden;
  }
  .stage-inner{
    position:absolute;top:50%;left:50%;
    display:flex;flex-direction:column;align-items:center;gap:20px;
    transform:translate(-50%,-50%) scale(1);
    transform-origin:center center;
    will-change:transform;
  }

  .banner-wrap{position:relative;display:flex;flex-direction:column;align-items:center}

  /* Physical banner — 850×2000 design units. 1px = 1mm */
  .banner{
    width:850px;height:2000px;
    background:var(--paper);
    color:var(--ink);
    position:relative;
    box-shadow:
      0 80px 120px -40px oklch(0 0 0 / 0.7),
      0 0 0 1px oklch(1 0 0 / 0.04);
    overflow:hidden;
    transform-origin:top center;
    /* Fine technical grid — 20mm squares, hairline */
    background-image:
      linear-gradient(to right, color-mix(in oklch, var(--ink) 8%, transparent) 0, color-mix(in oklch, var(--ink) 8%, transparent) 1px, transparent 1px, transparent 20px),
      linear-gradient(to bottom, color-mix(in oklch, var(--ink) 8%, transparent) 0, color-mix(in oklch, var(--ink) 8%, transparent) 1px, transparent 1px, transparent 20px);
    background-size: 40px 40px, 40px 40px;
  }
  .banner[data-bleed="true"]::after{
    content:"";position:absolute;inset:30px;border:1px dashed color-mix(in oklch, var(--ink) 30%, transparent);pointer-events:none;
  }
  .banner[data-bleed="true"]::before{
    content:"SAFE AREA · 30 mm";
    position:absolute;top:32px;left:36px;font:500 10px/1 "JetBrains Mono";letter-spacing:.2em;color:var(--ink-3);
    background:var(--paper);padding:4px 8px;z-index:10;
  }

  /* ========= Aluminum stand base/top ========= */
  .stand-base{
    width:900px;height:40px;margin-top:-2px;
    background:linear-gradient(180deg, oklch(0.82 0.005 260) 0%, oklch(0.58 0.005 260) 50%, oklch(0.32 0.005 260) 100%);
    border-radius:0 0 8px 8px;
    box-shadow:0 30px 60px -10px oklch(0 0 0 / 0.6);
    position:relative;
  }
  .stand-base::before{
    content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:180px;height:16px;
    background:linear-gradient(180deg, oklch(0.72 0.005 260), oklch(0.42 0.005 260));
    border-radius:0 0 6px 6px;
  }
  .stand-top{
    width:860px;height:10px;background:linear-gradient(180deg, oklch(0.65 0.005 260), oklch(0.42 0.005 260));
    border-radius:4px 4px 0 0;margin-bottom:-2px;
  }

  /* ========= Meta label ========= */
  .meta-label{
    position:absolute;left:-180px;top:200px;width:160px;
    font:500 10px/1.6 "JetBrains Mono";letter-spacing:.15em;text-transform:uppercase;color:oklch(0.72 0.005 90);
    text-align:right;
  }
  .meta-label b{color:oklch(0.96 0 0);font-weight:500}
  .meta-label .dim{color:oklch(0.55 0.005 90)}
  @media(max-width:1400px){.meta-label{display:none}}

  /* ========= COMMON BANNER CHROME ========= */
  .top-bar{
    position:absolute;top:0;left:0;right:0;height:18px;
    background:var(--accent);
  }
  .cap{
    height:8px;background:var(--ink);
  }
  .ticker-band{
    height:34px;background:var(--ink);color:var(--paper);
    display:flex;align-items:center;overflow:hidden;white-space:nowrap;
    font:500 11px/1 "JetBrains Mono";letter-spacing:.14em;text-transform:uppercase;
  }
  .ticker-band .run{display:flex;gap:40px;padding:0 40px;animation:run 40s linear infinite}
  .ticker-band .run span::before{content:"◆  ";color:var(--accent);margin-right:10px}
  @keyframes run{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ========= Brand lockup ========= */
  .brand-block{display:flex;align-items:center;gap:14px;font:500 20px/1 "JetBrains Mono";letter-spacing:-.005em}
  .brand-block .mark{
    width:44px;height:44px;border:2px solid var(--ink);border-radius:50%;
    position:relative;display:grid;place-items:center;flex:0 0 44px;
  }
  .brand-block .mark::before,.brand-block .mark::after{content:"";position:absolute;background:var(--ink)}
  .brand-block .mark::before{width:20px;height:2.5px}
  .brand-block .mark::after{width:2.5px;height:20px}
  .brand-block .slash{color:var(--ink-3)}
  .brand-block .accent{color:var(--accent);font-weight:600}

  /* ========= Shared typography ========= */
  .eyebrow{font:500 13px/1 "JetBrains Mono";letter-spacing:.22em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:14px}
  .eyebrow::before{content:"§";font-size:14px}
  .eyebrow-line{flex:1;height:1px;background:var(--rule-strong);max-width:120px}

  /* ========= SECTIONS PER VARIANT ========= */

  /* ============================================================
     VARIANT A — "CLASSIC" Editorial hierarchy
     ============================================================ */
  .variant-classic{
    padding:40px 64px 44px;
    display:flex;flex-direction:column;
    gap:0;
  }

  .va-head{
    padding-top:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;
    padding-bottom:22px;border-bottom:1px solid var(--rule-strong);
  }
  .va-head .v{
    text-align:right;font:500 11px/1.5 "JetBrains Mono";letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);
  }
  .va-head .v b{color:var(--ink);display:block;font-size:14px;margin-bottom:4px;letter-spacing:.08em}

  .va-eyebrows{
    display:flex;gap:22px;margin-top:28px;
    font:500 12px/1 "JetBrains Mono";letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);
  }
  .va-eyebrows span::before{content:""}

  .va-headline{
    font-family:"Instrument Serif";font-weight:400;
    font-size:118px;line-height:.88;letter-spacing:-.03em;
    margin-top:22px;
  }
  .va-headline em{
    font-style:italic;color:var(--accent);
  }

  .va-sub{
    font-family:"Geist";font-weight:400;font-size:21px;line-height:1.35;color:var(--ink-2);
    margin-top:22px;max-width:40ch;text-wrap:pretty;
  }
  .va-sub b{color:var(--ink);font-weight:500}

  .va-kpis{
    display:grid;grid-template-columns:repeat(4,1fr);
    margin-top:36px;
    border-top:1px solid var(--rule-strong);border-bottom:1px solid var(--rule-strong);
  }
  .va-kpis .kpi{
    padding:16px 14px;border-right:1px solid var(--rule);
  }
  .va-kpis .kpi:last-child{border-right:none}
  .va-kpis .n{font-family:"Instrument Serif";font-size:52px;line-height:1;letter-spacing:-.02em}
  .va-kpis .n sup{font-size:.38em;vertical-align:top;margin-left:3px;color:var(--accent)}
  .va-kpis .l{font:500 10px/1.3 "JetBrains Mono";letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-top:8px}

  /* Architecture — VISUAL CENTERPIECE of the banner */
  .va-arch{
    margin-top:34px;padding:28px 0 22px;
    border-top:2.5px solid var(--ink);border-bottom:2.5px solid var(--ink);
    position:relative;
  }
  .va-arch::before{
    content:"THE STACK";position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    background:var(--paper);padding:0 16px;
    font:600 11px/1 "JetBrains Mono";letter-spacing:.32em;color:var(--accent);
  }
  .va-arch .arch-title{
    text-align:center;margin-bottom:6px;
    font-family:"Instrument Serif";font-size:38px;line-height:1;letter-spacing:-.02em;
  }
  .va-arch .arch-title em{
    font-style:italic;color:var(--accent);
  }
  .va-arch .arch-sub{
    text-align:center;margin:6px auto 18px;max-width:44ch;
    font:400 13px/1.45 "Geist";color:var(--ink-2);text-wrap:pretty;
  }
  .va-arch .tier-label{
    font:500 10px/1 "JetBrains Mono";letter-spacing:.28em;color:var(--ink-3);
    text-transform:uppercase;text-align:center;margin-bottom:12px;
  }
  .va-arch .clients{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;padding-bottom:4px}
  .va-arch .pill{
    padding:6px 2px;font:500 13px/1 "Geist";color:var(--ink);position:relative;
  }
  .va-arch .pill::after{
    content:"";position:absolute;inset:auto 0 -3px 0;height:1.5px;background:var(--rule-strong);
  }
  .va-arch .wire{display:block;margin:10px auto 4px}
  .va-arch .wire svg{display:block;margin:0 auto}

  .va-arch .gate{
    margin:10px auto 0;padding:14px 0;background:transparent;color:var(--ink);
    display:flex;align-items:center;justify-content:center;gap:14px;
    font:500 19px/1.1 "JetBrains Mono";letter-spacing:-.005em;
    width:max-content;max-width:92%;position:relative;
  }
  .va-arch .gate .gk{color:var(--accent);font-weight:600}
  .va-arch .gate .gs{opacity:.5;font-weight:400}
  .va-arch .gate .dot{
    width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 5px color-mix(in oklch, var(--accent) 30%, transparent);
    animation:pulse 1.8s ease infinite;flex:0 0 9px;
  }
  .va-arch .gate .tag{
    background:var(--accent);color:var(--accent-ink);
    font:600 9px/1 "JetBrains Mono";letter-spacing:.18em;padding:5px 8px;
    margin-left:4px;
  }
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.55}}

  .va-arch .servers{
    display:grid;grid-template-columns:repeat(4,1fr);
    border-top:1px solid var(--rule);border-left:1px solid var(--rule);
    margin:18px 0 4px;
  }
  .va-arch .node{
    padding:12px 10px;text-align:center;position:relative;
    border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);
  }
  .va-arch .node .n{
    display:inline-block;font:500 14px/1.1 "JetBrains Mono";color:var(--ink);letter-spacing:-.005em;
  }
  .va-arch .node .t{
    display:block;font:500 10px/1.2 "Geist";letter-spacing:.12em;color:var(--ink-3);
    text-transform:uppercase;margin-top:6px;
  }
  .va-arch .node .ct{
    position:absolute;top:8px;right:10px;font:500 9px/1 "JetBrains Mono";
    color:var(--ink-3);letter-spacing:.06em;
  }
  .va-arch .node.star{background:color-mix(in oklch, var(--accent) 9%, var(--paper))}
  .va-arch .node.star .n{
    color:var(--accent);
    text-decoration:underline;text-decoration-color:var(--accent);text-decoration-thickness:2px;text-underline-offset:4px;
  }
  .va-arch .node.star .ct{color:var(--accent);font-weight:600}

  .va-arch .infra{
    display:flex;flex-wrap:wrap;gap:4px 20px;justify-content:center;
    padding:12px 12px 0;font:500 11px/1.4 "JetBrains Mono";color:var(--ink-3);letter-spacing:.06em;
  }
  .va-arch .infra span{position:relative;padding-left:14px}
  .va-arch .infra span::before{
    content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:6px;height:6px;border:1.5px solid var(--accent);border-radius:50%;
  }
  .va-arch .infra b{color:var(--ink);font-weight:500}

  /* Reasons row — thin rules, clean headings (no underlines) */
  .va-reasons{
    margin-top:28px;display:grid;grid-template-columns:repeat(3,1fr);gap:0;
    border-top:1px solid var(--rule);padding-top:20px;
  }
  .va-reasons .r{
    padding:0 14px 0 0;
  }
  .va-reasons .r + .r{padding-left:18px;border-left:1px solid var(--rule)}
  .va-reasons .idx{font:500 10px/1 "JetBrains Mono";color:var(--ink-3);letter-spacing:.16em;margin-bottom:10px;text-transform:uppercase}
  .va-reasons h3{
    font-family:"Instrument Serif";font-size:24px;line-height:1.05;letter-spacing:-.01em;
  }
  .va-reasons h3 em{
    font-style:italic;color:var(--accent);
  }
  .va-reasons p{font:400 12px/1.45 "Geist";color:var(--ink-2);margin-top:10px;text-wrap:pretty}

  /* CTA / Footer block */
  .va-foot{
    margin-top:auto;padding-top:24px;
    border-top:1px solid var(--rule-strong);
    display:grid;grid-template-columns:1.2fr 1fr;gap:20px;align-items:end;
  }
  .va-foot .cta-line{
    font-family:"Instrument Serif";font-style:italic;font-size:26px;line-height:1.1;color:var(--ink);
    max-width:20ch;
  }
  .va-foot .cta-line em{
    font-style:italic;color:var(--accent);
  }
  .va-foot .contacts{
    display:flex;flex-direction:column;gap:10px;text-align:right;
    font:500 13px/1.4 "JetBrains Mono";color:var(--ink-2);
  }
  .va-foot .contacts b{color:var(--ink);font-weight:500}
  .va-foot .contacts .accent{color:var(--accent)}

  /* QR — clean, no container */
  .qr{
    width:148px;height:148px;flex:0 0 148px;
    display:grid;place-items:center;
  }
  .qr img{width:100%;height:100%;display:block;image-rendering:pixelated}
  /* QR block — no container, just whitespace + rule */
  .qr-block{
    display:flex;gap:22px;align-items:center;
    padding:18px 0 0;margin-top:22px;
    border-top:1px solid var(--rule);
  }
  .qr-block .qt{font:500 11px/1.4 "JetBrains Mono";letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
  .qr-block .qt b{
    display:inline-block;color:var(--ink);font-size:19px;margin-bottom:10px;letter-spacing:.04em;font-weight:500;
  }
  .qr-block .qt .url{color:var(--accent);font-size:14px;margin-top:12px;letter-spacing:.02em;font-weight:500}

  /* ============================================================
     VARIANT B — "TERMINAL" — terminal-led, dark band hero
     ============================================================ */
  .variant-terminal{
    display:flex;flex-direction:column;height:100%;
  }
  .vb-top{
    background:var(--ink);color:var(--paper);
    padding:56px 64px 44px;position:relative;
  }
  .vb-top .brand-block{color:var(--paper)}
  .vb-top .brand-block .mark{border-color:var(--paper)}
  .vb-top .brand-block .mark::before,.vb-top .brand-block .mark::after{background:var(--paper)}
  .vb-top .brand-block .slash{color:oklch(0.60 0.005 90)}
  .vb-top .eyebrow{color:var(--accent);margin-top:38px}
  .vb-top h1{
    font-family:"Instrument Serif";font-weight:400;color:var(--paper);
    font-size:116px;line-height:.92;letter-spacing:-.03em;margin-top:16px;
  }
  .vb-top h1 em{color:var(--accent);font-style:italic}

  .vb-term{
    margin:0 64px;
    background:var(--term-bg);color:var(--term-ink);
    border-radius:12px;overflow:hidden;
    font-family:"JetBrains Mono";font-size:15px;line-height:1.7;
    box-shadow:0 40px 80px -30px oklch(0 0 0 / 0.6);
    transform:translateY(-36px);
    border:1px solid oklch(1 0 0 / .06);
  }
  .vb-term-chrome{
    display:flex;align-items:center;gap:10px;padding:12px 16px;
    background:oklch(0 0 0 / .3);border-bottom:1px solid oklch(1 0 0 / .07);
  }
  .vb-term-dots{display:flex;gap:6px}
  .vb-term-dots i{width:12px;height:12px;border-radius:50%;background:oklch(0.60 0.15 25)}
  .vb-term-dots i:nth-child(2){background:oklch(0.78 0.13 85)}
  .vb-term-dots i:nth-child(3){background:oklch(0.72 0.14 145)}
  .vb-term-title{flex:1;text-align:center;font-size:11px;color:var(--term-dim);letter-spacing:.12em}
  .vb-term-badge{font-size:10px;padding:3px 8px;border-radius:3px;background:var(--accent);color:var(--accent-ink);letter-spacing:.12em;font-weight:600}
  .vb-term-body{padding:22px 24px}
  .vb-term-body .pr{color:var(--term-green)}
  .vb-term-body .dm{color:var(--term-dim)}
  .vb-term-body .ok{color:var(--term-green)}
  .vb-term-body .tl{color:var(--term-accent);background:oklch(1 0 0 / .05);padding:1px 6px;border-radius:3px}
  .vb-term-body .mv{color:oklch(0.78 0.11 310)}
  .caret-b::after{content:"▊";color:var(--term-green);animation:blink 1.1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  .vb-body{
    padding:20px 64px 56px;flex:1;display:flex;flex-direction:column;
  }
  .vb-kpis{
    display:grid;grid-template-columns:repeat(4,1fr);
    border-top:1px solid var(--rule-strong);border-bottom:1px solid var(--rule-strong);
    margin-bottom:36px;
  }
  .vb-kpis .kpi{padding:18px 14px;border-right:1px solid var(--rule);text-align:left}
  .vb-kpis .kpi:last-child{border-right:none}
  .vb-kpis .n{font-family:"Instrument Serif";font-size:52px;line-height:1;letter-spacing:-.02em}
  .vb-kpis .n sup{font-size:.38em;vertical-align:top;margin-left:3px;color:var(--accent)}
  .vb-kpis .l{font:500 10px/1.3 "JetBrains Mono";letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-top:8px}

  .vb-audiences{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border-top:1px solid var(--rule);border-left:1px solid var(--rule)}
  .vb-audiences .a{padding:20px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);display:flex;flex-direction:column;gap:8px}
  .vb-audiences .sym{font-family:"Instrument Serif";font-size:32px;line-height:1;color:var(--accent)}
  .vb-audiences h4{font-family:"Instrument Serif";font-size:22px;line-height:1.05}
  .vb-audiences p{font-size:12.5px;line-height:1.45;color:var(--ink-2);text-wrap:pretty}

  .vb-pull{
    font-family:"Instrument Serif";font-size:34px;line-height:1.1;letter-spacing:-.015em;
    margin:36px 0 28px;text-align:center;max-width:24ch;margin-left:auto;margin-right:auto;
  }
  .vb-pull em{color:var(--accent);font-style:italic}

  .vb-foot{

function fitScale(){
  const vw = window.innerWidth, vh = window.innerHeight;
  // natural box: banner (850w) + meta-label (180w when visible) and banner+stand+caption height (~2080)
  const wideMeta = vw > 1400;
  const naturalW = wideMeta ? 850 + 200 : 850;
  const naturalH = 2000 + 80;  // stand top+base+caption
  const marginX = 80, marginY = 80;
  const scale = Math.min(
    (vw - marginX) / naturalW,
    (vh - marginY) / naturalH,
    1
  );
  const s = Math.max(0.12, scale);
  scaleWrap.style.transform = `translate(-50%,-50%) scale(${s})`;
}
window.addEventListener('resize', fitScale);

/* ============================================================
   Render variant template into .banner
   ============================================================ */
function render(variant){
  const tpl = document.getElementById('tpl-'+variant);
  if(!tpl) return;
  banner.innerHTML = '';
  banner.appendChild(tpl.content.cloneNode(true));

  const labels = {classic:'Classic · editorial', terminal:'Terminal-led · dark hero', poster:'Poster · bold serif'};
  document.getElementById('variantLabel').textContent = labels[variant];
}

/* ============================================================
   Tweaks
   ============================================================ */
function applyTweaks(t){
  document.body.dataset.palette = t.palette;
  document.body.dataset.accent = t.accent;
  banner.dataset.bleed = String(t.showBleed);
  standTop.style.display = t.showStand ? '' : 'none';
  standBase.style.display = t.showStand ? '' : 'none';
  render(t.variant);
  fitScale();
}

function setTweak(key, val){
  if(val==='true') val=true;
  else if(val==='false') val=false;
  TWEAKS[key]=val;
  applyTweaks(TWEAKS);
  document.querySelectorAll(`.tw-row .seg[data-key="${key}"] button`).forEach(b=>{
    b.classList.toggle('on', String(b.dataset.v)===String(val));
  });
  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:val}},'*');
}

document.querySelectorAll('.tw-row .seg').forEach(seg=>{
  const key = seg.dataset.key;
  seg.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>setTweak(key, btn.dataset.v));
  });
});

/* Initialize selected buttons from TWEAKS */
function syncButtons(){
  document.querySelectorAll('.tw-row .seg').forEach(seg=>{
    const key = seg.dataset.key;
    const val = TWEAKS[key];
    seg.querySelectorAll('button').forEach(b=>{
      b.classList.toggle('on', String(b.dataset.v)===String(val));
    });
  });
}

/* Edit-mode protocol */
window.addEventListener('message', e=>{
  const d = e.data || {};
  if(d.type==='__activate_edit_mode') document.getElementById('tweaks').classList.add('on');
  if(d.type==='__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');
});
window.parent.postMessage({type:'__edit_mode_available'},'*');

/* Boot */
syncButtons();
applyTweaks(TWEAKS);
fitScale();
window.addEventListener('load', fitScale);
</script>
</body>
