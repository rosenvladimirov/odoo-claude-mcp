# Claude Code terminal + Odoo RPC MCP
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d --build
#   Open http://localhost:8080
#
# Networks:
#   public   — exposed to host/Cloudflare (odoo-rpc-mcp, claude-terminal)
#   backend  — internal only, no host access (portainer, github, teams)
#   odoo-rpc-mcp bridges both networks (proxy gateway)

networks:
  public:
    driver: bridge
  backend:
    driver: bridge
  cloudflare-net:
    external: true

services:
  # ─── Claude Code web terminal (ttyd + Claude CLI, multi-user) ──
  claude-terminal:
    build:
      context: ./claude-terminal
      dockerfile: Dockerfile
    container_name: claude-terminal
    restart: unless-stopped
    networks:
      - public
      - backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_THEME=${CLAUDE_THEME:-github}
      - MCP_URL=http://odoo-rpc-mcp:8084
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${TERMINAL_PORT:-8080}:8080"
    volumes:
      # Per-user persistent data (isolated HOME dirs)
      - claude-user-data:/data/users
      # Templates (read-only, copied to user dir on first login)
      - ./claude-terminal/settings.json:/home/claude/template/settings.json:ro
      - ./claude-terminal/.mcp.json:/home/claude/template/.mcp.json:ro
      - ./claude-terminal/CLAUDE.md:/home/claude/template/CLAUDE.md:ro
      # Shared data (connections, memory, sessions)
      - ${HOME}/odoo-claude-connections:/shared-data
    tty: true
    stdin_open: true
    labels:
      - "com.blconsulting.service=claude-terminal"

  # ─── Odoo RPC MCP (XML-RPC / JSON-RPC) ───────────────────
  # PUBLIC GATEWAY — bridges public + backend networks
  # Proxies portainer/github/teams via proxy_call/proxy_discover
  odoo-rpc-mcp:
    build:
      context: ./odoo-rpc-mcp
      dockerfile: Dockerfile
    container_name: mcp-odoo-rpc
    restart: unless-stopped
    networks:
      - public
      - backend
      - cloudflare-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MCP_PORT=8084
      - MCP_HOST=0.0.0.0
      - SINGLE_CONNECTION=true
      - ODOO_URL=${ODOO_URL:-}
      - ODOO_DB=${ODOO_DB:-}
      - ODOO_USERNAME=${ODOO_USERNAME:-}
      - ODOO_PASSWORD=${ODOO_PASSWORD:-}
      - ODOO_API_KEY=${ODOO_API_KEY:-}
      - ODOO_PROTOCOL=${ODOO_PROTOCOL:-xmlrpc}
      - GOOGLE_CREDENTIALS_FILE=/data/google_credentials.json
      - GOOGLE_TOKEN_FILE=/data/google_token.json
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
      - TELEGRAM_SESSION_PATH=/data/telegram_session
      - SSH_AUTH_SOCK=/ssh-agent
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    ports:
      - "${ODOO_MCP_PORT:-8084}:8084"
    volumes:
      - ${HOME}/odoo-claude-connections:/data
      - ${HOME}/Проекти/odoo/odoo-18.0/claude.ai/.odoo_connections:/config:ro
      - ${HOME}/.ssh:/home/mcp/.ssh:ro
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent:ro
      - ./proxy_services.json:/data/proxy_services.json:ro
      - mcp-repos:/repos:ro
    labels:
      - "com.blconsulting.service=mcp-odoo-rpc"

  # ─── Portainer MCP (Docker management via Portainer API) ──
  # BACKEND ONLY — accessible via proxy or claude-terminal
  portainer-mcp:
    build:
      context: ./portainer-mcp
      dockerfile: Dockerfile
    container_name: mcp-portainer
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8085
      - PORTAINER_URL=${PORTAINER_URL:-}
      - PORTAINER_TOKEN=${PORTAINER_TOKEN:-}
      - READ_ONLY=${PORTAINER_READ_ONLY:-}
      - INSECURE_TLS=true
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - SSL_CERT_FILE=/dev/null
    command: >
      sh -c "supergateway
      --stdio 'portainer-mcp -server $${PORTAINER_URL} -token $${PORTAINER_TOKEN} -disable-version-check'
      --port $${MCP_PORT}"
    labels:
      - "com.blconsulting.service=mcp-portainer"

  # ─── Microsoft Teams MCP (Teams messaging) ─────────────────
  # BACKEND ONLY — accessible via proxy or claude-terminal
  teams-mcp:
    build:
      context: ./teams-mcp
      dockerfile: Dockerfile
    container_name: mcp-teams
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8087
      - TEAMS_APP_ID=${TEAMS_APP_ID:-}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD:-}
      - TEAMS_APP_TYPE=${TEAMS_APP_TYPE:-SingleTenant}
      - TEAMS_APP_TENANT_ID=${TEAMS_APP_TENANT_ID:-}
      - TEAM_ID=${TEAMS_TEAM_ID:-}
      - TEAMS_CHANNEL_ID=${TEAMS_CHANNEL_ID:-}
      - MCP_LOGLEVEL=${TEAMS_LOG_LEVEL:-ERROR}
    labels:
      - "com.blconsulting.service=mcp-teams"

  # ─── GitHub MCP (GitHub repo management) ───────────────────
  # BACKEND ONLY — accessible via proxy or claude-terminal
  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: mcp-github
    restart: unless-stopped
    networks:
      - backend
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN:-}
    command: ["http", "--port", "8086", "--toolsets", "all"]
    labels:
      - "com.blconsulting.service=mcp-github"

  # ─── OCA MCP (OCA addon management) ────────────────────────
  # BACKEND ONLY — OCA maintainer-tools + git repo management
  oca-mcp:
    build:
      context: ./oca-mcp
      dockerfile: Dockerfile
    container_name: mcp-oca
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8089
      - ODOO_BRANCH=${ODOO_BRANCH:-19.0}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - mcp-repos:/repos
    labels:
      - "com.blconsulting.service=mcp-oca"

  # ─── EE MCP (Enterprise module management) ────────────────
  # BACKEND ONLY — Enterprise clone/update, license check, OCA conflicts
  ee-mcp:
    build:
      context: ./ee-mcp
      dockerfile: Dockerfile
    container_name: mcp-ee
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8090
      - ODOO_BRANCH=${ODOO_BRANCH:-19.0}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - mcp-repos:/repos
    labels:
      - "com.blconsulting.service=mcp-ee"

  # ─── Filesystem MCP (file/folder management) ──────────────
  # BACKEND ONLY — sandboxed file operations on /repos volume
  filesystem-mcp:
    build:
      context: ./filesystem-mcp
      dockerfile: Dockerfile
    container_name: mcp-filesystem
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8088
    volumes:
      - mcp-repos:/repos
    labels:
      - "com.blconsulting.service=mcp-filesystem"

volumes:
  claude-user-data:
    driver: local
  mcp-repos:
    driver: local
