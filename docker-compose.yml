# Odoo MCP v3 — developer/integrator gateway (transparent proxy към remote v2.x)
#
# Usage:
#   cp .env.example .env && nano .env       # set MCP_TOKEN_<id> bootstrap tokens
#   cp proxy_services.v3.example.json proxy_services.json
#   docker compose up -d --build
#
# Networks:
#   public   — exposed to host/Cloudflare (odoo-rpc-mcp gateway)
#   backend  — internal only, no host access (oca, ee, filesystem, backup, qdrant, ollama)
#   odoo-rpc-mcp bridges both networks + cloudflare-net (proxy gateway)

networks:
  public:
    driver: bridge
  backend:
    driver: bridge
  cloudflare-net:
    external: true

services:
  # ─── Odoo RPC MCP v3 — transparent proxy gateway ──────────
  # PUBLIC GATEWAY — bridges public + backend networks
  # Proxies remote v2.x stacks + local oca/ee/filesystem/backup
  # See proxy_services.v3.example.json + V3_TRANSPARENT_PROXY.md
  odoo-rpc-mcp:
    build:
      context: ./odoo-rpc-mcp
      dockerfile: Dockerfile
    container_name: mcp-odoo-rpc
    restart: unless-stopped
    networks:
      - public
      - backend
      - cloudflare-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MCP_PORT=8084
      - MCP_HOST=0.0.0.0
      - SINGLE_CONNECTION=true
      - ODOO_URL=${ODOO_URL:-}
      - ODOO_DB=${ODOO_DB:-}
      - ODOO_USERNAME=${ODOO_USERNAME:-}
      - ODOO_PASSWORD=${ODOO_PASSWORD:-}
      - ODOO_API_KEY=${ODOO_API_KEY:-}
      - ODOO_PROTOCOL=${ODOO_PROTOCOL:-xmlrpc}
      - MCP_SECRET_TOKEN=${MCP_SECRET_TOKEN:-}
      - AUTH_CACHE_TTL=${AUTH_CACHE_TTL:-300}
      - ALLOWED_ODOO_URLS=${ALLOWED_ODOO_URLS:-}
      - GOOGLE_CREDENTIALS_FILE=/data/google_credentials.json
      - GOOGLE_TOKEN_FILE=/data/google_token.json
      - TELEGRAM_API_ID=${TELEGRAM_API_ID:-}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH:-}
      - TELEGRAM_SESSION_PATH=/data/telegram_session
      - SSH_AUTH_SOCK=/ssh-agent
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    ports:
      - "${ODOO_MCP_PORT:-8084}:8084"
    volumes:
      - ${HOME}/odoo-claude-connections:/data
      - ${HOME}/Проекти/odoo/odoo-18.0/claude.ai/.odoo_connections:/config:ro
      - ${HOME}/.ssh:/home/mcp/.ssh:ro
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent:ro
      - ./proxy_services.json:/data/proxy_services.json:ro
      - mcp-repos:/repos:ro
      - mcp-backups:/backups:rw
    labels:
      - "com.blconsulting.service=mcp-odoo-rpc"

  # ─── Portainer MCP (Docker management via Portainer API) ──
  # OPTIONAL — only starts with `--profile portainer` or `--profile full`
  # Requires PORTAINER_URL + PORTAINER_TOKEN in .env
  portainer-mcp:
    profiles: ["portainer", "full"]
    build:
      context: ./portainer-mcp
      dockerfile: Dockerfile
    container_name: mcp-portainer
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8085
      - PORTAINER_URL=${PORTAINER_URL:-}
      - PORTAINER_TOKEN=${PORTAINER_TOKEN:-}
      - READ_ONLY=${PORTAINER_READ_ONLY:-}
      - INSECURE_TLS=true
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - SSL_CERT_FILE=/dev/null
    command: >
      sh -c "supergateway
      --stdio 'portainer-mcp -server $${PORTAINER_URL} -token $${PORTAINER_TOKEN} -disable-version-check'
      --port $${MCP_PORT}"
    labels:
      - "com.blconsulting.service=mcp-portainer"

  # ─── GitHub MCP (GitHub repo management) ───────────────────
  # BACKEND ONLY — accessible via gateway proxy
  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: mcp-github
    restart: unless-stopped
    networks:
      - backend
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN:-}
    command: ["http", "--port", "8086", "--toolsets", "all"]
    labels:
      - "com.blconsulting.service=mcp-github"

  # ─── OCA MCP (OCA addon management) ────────────────────────
  # BACKEND ONLY — OCA maintainer-tools + git repo management
  oca-mcp:
    build:
      context: ./oca-mcp
      dockerfile: Dockerfile
    container_name: mcp-oca
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8089
      - ODOO_BRANCH=${ODOO_BRANCH:-19.0}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - mcp-repos:/repos
    labels:
      - "com.blconsulting.service=mcp-oca"

  # ─── EE MCP (Enterprise module management) ────────────────
  # BACKEND ONLY — Enterprise clone/update, license check, OCA conflicts
  ee-mcp:
    build:
      context: ./ee-mcp
      dockerfile: Dockerfile
    container_name: mcp-ee
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8090
      - ODOO_BRANCH=${ODOO_BRANCH:-19.0}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - mcp-repos:/repos
    labels:
      - "com.blconsulting.service=mcp-ee"

  # ─── Qdrant vector DB (AI Tokenizer storage) ──────────────
  # BACKEND ONLY — accessed by Odoo ai_tokenizer + qdrant-mcp
  # REST on 6333, gRPC on 6334
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    networks:
      - backend
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    ports:
      # Expose only when the Odoo instance is on a different host.
      # Remove the publish if Odoo is co-located on this Docker network.
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    labels:
      - "com.blconsulting.service=qdrant"

  # ─── Ollama (local embedding engine) ──────────────────────
  # BACKEND ONLY — used by Odoo ai_tokenizer (default embedder)
  # Pull model once after first start:
  #   docker exec ollama ollama pull nomic-embed-text
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    labels:
      - "com.blconsulting.service=ollama"

  # ─── Filesystem MCP (file/folder management) ──────────────
  # BACKEND ONLY — sandboxed file operations on /repos volume
  filesystem-mcp:
    build:
      context: ./filesystem-mcp
      dockerfile: Dockerfile
    container_name: mcp-filesystem
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8088
    volumes:
      - mcp-repos:/repos
    labels:
      - "com.blconsulting.service=mcp-filesystem"

  # ─── Backup MCP (stock snapshots, DB dumps, future S3 sync) ──
  # BACKEND ONLY — shared volume mcp-backups rw with odoo-rpc-mcp.
  # Stock tools write JSON snapshots before destructive ops; plugin
  # exposes list/read/delete/archive via MCP tools.
  backup-mcp:
    build:
      context: ./backup-mcp
      dockerfile: Dockerfile
    container_name: mcp-backup
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8092
    volumes:
      - mcp-backups:/backups
    labels:
      - "com.blconsulting.service=mcp-backup"

  # ─── Supervisor MCP (ADMIN: Odoo addons-topology) ────────
  # ADMIN class. Owns the rule: canonical modules = /opt git;
  # the two farm layers must be PURE symlinks into /opt.
  # SSH-capable + powerful → bound to 127.0.0.1 only, and added
  # ONLY to admin .mcp.json (never tenant/USER configs).
  supervisor-mcp:
    build:
      context: ./supervisor-mcp
      dockerfile: Dockerfile
    container_name: mcp-supervisor
    restart: unless-stopped
    networks:
      - backend
    environment:
      - MCP_PORT=8097
      - SUPERVISOR_CONNECTIONS=/connections/connections.json
      - SUPERVISOR_SSH_OPTS=${SUPERVISOR_SSH_OPTS:-}
      - SSH_AUTH_SOCK=/ssh-agent
    ports:
      - "127.0.0.1:${SUPERVISOR_MCP_PORT:-8097}:8097"
    volumes:
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent:ro
      - ${HOME}/.claude/odoo_connections:/connections:ro
    labels:
      - "com.blconsulting.service=mcp-supervisor"

volumes:
  mcp-repos:
    driver: local
  mcp-backups:
    driver: local
  qdrant-storage:
    driver: local
  ollama-data:
    driver: local
