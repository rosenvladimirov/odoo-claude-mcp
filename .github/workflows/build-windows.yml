name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # needed by softprops/action-gh-release to create/attach GitHub Releases

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PySide6 pyinstaller

      - name: Build exe
        shell: bash
        run: |
          pyinstaller --onefile --noconsole --name OdooConnect \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --hidden-import PySide6.QtWidgets \
            tools/odoo_connect_qt.py

      - name: Install NSIS
        shell: bash
        run: choco install nsis -y

      - name: Build installer (NSIS)
        shell: bash
        run: |
          "/c/Program Files (x86)/NSIS/makensis.exe" packaging/windows/installer.nsi

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: OdooConnect-windows
          path: |
            dist/OdooConnect.exe
            packaging/windows/*.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/OdooConnect.exe
            packaging/windows/OdooConnectSetup.exe
