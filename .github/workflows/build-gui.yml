name: Build GUI (Windows + Linux)

on:
  push:
    branches: ["2.0", "3.0"]
    paths:
      - "tools/odoo_connect_qt.py"
      - "tools/odoo_connect_qt.spec"
      - ".github/workflows/build-gui.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artefact: OdooConnect-windows
            ext: .exe
          - os: ubuntu-latest
            artefact: OdooConnect-linux
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 requests paramiko

      - name: Build with PyInstaller
        working-directory: tools
        run: pyinstaller --clean --noconfirm odoo_connect_qt.spec

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artefact }}
          path: tools/dist/OdooConnect${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 30
