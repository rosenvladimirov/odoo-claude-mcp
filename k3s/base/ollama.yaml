---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels: { app: ollama, tier: backend }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: ollama } }
  template:
    metadata:
      labels: { app: ollama, tier: backend }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits:   { cpu: "4",    memory: "8Gi" }
          readinessProbe:
            tcpSocket: { port: 11434 }
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  selector: { app: ollama }
  ports: [{ port: 11434, targetPort: 11434 }]
  type: ClusterIP
