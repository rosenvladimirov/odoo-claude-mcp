# NOTE: This is the schema reference. Don't apply it directly — use the `secretGenerator`
# in overlays/prod/kustomization.yaml with a .env file that is gitignored.
#
# Fields expected by the deployments below:
apiVersion: v1
kind: Secret
metadata:
  name: mcp-app
type: Opaque
stringData:
  # --- Anthropic / Claude terminal ---
  ANTHROPIC_API_KEY: ""
  CLAUDE_THEME: "github"
  # --- Odoo (odoo-rpc-mcp SINGLE_CONNECTION fallback) ---
  ODOO_URL: ""
  ODOO_DB: ""
  ODOO_USERNAME: ""
  ODOO_PASSWORD: ""
  ODOO_API_KEY: ""
  ODOO_PROTOCOL: "xmlrpc"
  # --- Portainer MCP ---
  PORTAINER_URL: ""
  PORTAINER_TOKEN: ""
  PORTAINER_READ_ONLY: "false"
  # --- Teams MCP ---
  TEAMS_APP_ID: ""
  TEAMS_APP_PASSWORD: ""
  TEAMS_APP_TYPE: "SingleTenant"
  TEAMS_APP_TENANT_ID: ""
  TEAMS_TEAM_ID: ""
  TEAMS_CHANNEL_ID: ""
  TEAMS_LOG_LEVEL: "ERROR"
  # --- GitHub / OCA / EE ---
  GITHUB_TOKEN: ""
  ODOO_BRANCH: "19.0"
  # --- Telegram ---
  TELEGRAM_API_ID: ""
  TELEGRAM_API_HASH: ""
  # --- Qdrant ---
  QDRANT_API_KEY: ""
---
# Optional SSH keys for odoo-rpc-mcp SSH bridge.
# Create manually:
#   kubectl -n odoo-mcp create secret generic ssh-keys \
#     --from-file=id_ed25519=$HOME/.ssh/id_ed25519 \
#     --from-file=id_ed25519.pub=$HOME/.ssh/id_ed25519.pub \
#     --from-file=known_hosts=$HOME/.ssh/known_hosts
apiVersion: v1
kind: Secret
metadata:
  name: ssh-keys
type: Opaque
stringData:
  id_ed25519: ""
  id_ed25519.pub: ""
  known_hosts: ""
