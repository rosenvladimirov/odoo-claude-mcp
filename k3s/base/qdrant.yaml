---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  labels: { app: qdrant, tier: backend }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: qdrant } }
  template:
    metadata:
      labels: { app: qdrant, tier: backend }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: QDRANT__SERVICE__HTTP_PORT
              value: "6333"
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
            - name: QDRANT__SERVICE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-app
                  key: QDRANT_API_KEY
                  optional: true
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet: { path: /readyz, port: 6333 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "4Gi"   }
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: qdrant-storage
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
spec:
  selector: { app: qdrant }
  ports:
    - port: 6333
      targetPort: 6333
      name: http
    - port: 6334
      targetPort: 6334
      name: grpc
  type: ClusterIP
