---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ee-mcp
  labels: { app: ee-mcp, tier: backend }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: ee-mcp } }
  template:
    metadata:
      labels: { app: ee-mcp, tier: backend }
    spec:
      containers:
        - name: ee-mcp
          image: ghcr.io/rosenvladimirov/ee-mcp:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_PORT
              value: "8090"
            - name: ODOO_BRANCH
              valueFrom: { secretKeyRef: { name: mcp-app, key: ODOO_BRANCH } }
            - name: GITHUB_TOKEN
              valueFrom: { secretKeyRef: { name: mcp-app, key: GITHUB_TOKEN } }
          ports:
            - containerPort: 8090
          volumeMounts:
            - name: repos
              mountPath: /repos
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi"   }
      volumes:
        - name: repos
          persistentVolumeClaim:
            claimName: mcp-repos
---
apiVersion: v1
kind: Service
metadata:
  name: ee-mcp
spec:
  selector: { app: ee-mcp }
  ports: [{ port: 8090, targetPort: 8090 }]
  type: ClusterIP
